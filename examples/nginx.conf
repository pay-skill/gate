# pay-gate sidecar configuration for nginx
#
# Prerequisites:
#   pay-gate start --sidecar  (listening on 127.0.0.1:8402)
#
# This config gates /api/ routes through pay-gate for x402 payment verification.
# Free routes (e.g., /health) can bypass pay-gate entirely.

server {
    listen 443 ssl;
    server_name api.example.com;

    ssl_certificate     /etc/ssl/certs/api.example.com.pem;
    ssl_certificate_key /etc/ssl/private/api.example.com.key;

    # Paid routes — gate through pay-gate
    location /api/ {
        auth_request /__pay_check;
        auth_request_set $pay_verified $upstream_http_x_pay_verified;
        auth_request_set $pay_from     $upstream_http_x_pay_from;
        auth_request_set $pay_amount   $upstream_http_x_pay_amount;

        proxy_set_header X-Pay-Verified  $pay_verified;
        proxy_set_header X-Pay-From      $pay_from;
        proxy_set_header X-Pay-Amount    $pay_amount;
        proxy_pass http://localhost:8080;

        # On 402, return the full payment-required response from pay-gate
        error_page 402 = @payment_required;
    }

    # Payment required handler — returns the 402 body from pay-gate
    location @payment_required {
        internal;
        proxy_pass http://127.0.0.1:8402/__pay/check;
    }

    # Internal auth subrequest to pay-gate
    location = /__pay_check {
        internal;
        proxy_pass http://127.0.0.1:8402/__pay/check;
        proxy_set_header X-Original-URI    $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header PAYMENT-SIGNATURE $http_payment_signature;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    # Health endpoint — direct to origin, no payment
    location = /health {
        proxy_pass http://localhost:8080;
    }
}
